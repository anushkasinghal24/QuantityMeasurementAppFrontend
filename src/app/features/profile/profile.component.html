<section class="page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Profile</h1>
      <p class="page-subtitle">Dummy profile details for the demo app.</p>
    </div>
  </header>

  <div class="grid grid-2">
    <div class="card panel">
      <h2 class="panel-title">Account</h2>

      <div class="profile-row">
        <div class="avatar" aria-hidden="true">{{ initials() }}</div>
        <div class="profile-meta">
          <div class="name">{{ name() }}</div>
          <div class="email">{{ email() || '—' }}</div>
        </div>
      </div>

      <div class="kv">
        <div class="k">Name</div>
        <div class="v">{{ name() }}</div>
        <div class="k">Email</div>
        <div class="v">{{ email() || '—' }}</div>
      </div>

      <div class="panel-actions">
        <button class="btn btn-secondary" type="button" (click)="logout()">Logout</button>
      </div>
    </div>

    <div class="card panel">
      <h2 class="panel-title">About</h2>
      <p class="panel-text">
        This is a dummy profile page for the Quantity Measurement App. Preferences and account settings can be added later.
      </p>
      <button class="btn btn-secondary" type="button" disabled>Edit profile (coming soon)</button>
    </div>
  </div>
</section>
